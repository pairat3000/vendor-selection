<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Vendor Selection logo">
  <defs>
    <linearGradient id="vsGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="vsOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="vsPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- green tile (top-left) -->
  <rect x="7" y="6" width="24" height="24" rx="6" fill="url(#vsGreen)"/>
  <!-- purple tile (bottom-right) -->
  <rect x="33" y="34" width="24" height="24" rx="6" fill="url(#vsPurple)"/>
  <!-- orange tile (center) with white halo -->
  <rect x="18.5" y="18.5" width="27" height="27" rx="7.5" fill="#fff"/>
  <rect x="20" y="20" width="24" height="24" rx="6.5" fill="url(#vsOrange)"/>
  <!-- checkmark -->
  <path d="M26 32.5 l4.2 4.2 L39 27.5" fill="none" stroke="#fff" stroke-width="3.6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
