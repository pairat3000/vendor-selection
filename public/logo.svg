<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Vendor Selection logo">
  <defs>
    <linearGradient id="vsGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5cc878"/>
      <stop offset="1" stop-color="#1f9d57"/>
    </linearGradient>
    <linearGradient id="vsOrange" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#f9a825"/>
      <stop offset="1" stop-color="#f4511e"/>
    </linearGradient>
    <linearGradient id="vsPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b39ddb"/>
      <stop offset="1" stop-color="#9575cd"/>
    </linearGradient>
  </defs>

  <!-- dotted cross + diagonal rays -->
  <g stroke="#1f2430" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="0.01 5">
    <line x1="32" y1="4"  x2="32" y2="16"/>   <!-- top -->
    <line x1="32" y1="48" x2="32" y2="60"/>   <!-- bottom -->
    <line x1="3"  y1="32" x2="16" y2="32"/>   <!-- left -->
    <line x1="48" y1="32" x2="61" y2="32"/>   <!-- right -->
    <line x1="42" y1="22" x2="60" y2="7"/>    <!-- diagonal top-right -->
    <line x1="22" y1="42" x2="6"  y2="57"/>   <!-- diagonal bottom-left -->
  </g>

  <!-- green tile (top-left) -->
  <rect x="9" y="8" width="23" height="23" rx="6" fill="url(#vsGreen)"/>
  <!-- purple tile (bottom-right) -->
  <rect x="32" y="33" width="23" height="23" rx="6" fill="url(#vsPurple)"/>
  <!-- orange tile (center) with white halo + checkmark -->
  <rect x="19" y="19" width="26" height="26" rx="7.5" fill="#fff"/>
  <rect x="20.5" y="20.5" width="23" height="23" rx="6.5" fill="url(#vsOrange)"/>
  <path d="M26.5 32.5 l4 4 L38 27.5" fill="none" stroke="#fff" stroke-width="3.6"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
